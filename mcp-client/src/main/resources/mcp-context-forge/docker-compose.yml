version: "3.8"

services:
  mcp-context-forge:
    # 企业级稳定版本 v1.0.0-RC2（截至 2026‑03‑09 最新 RC，包含安全加固和 RBAC）
    image: ghcr.io/ibm/mcp-context-forge:1.0.0-RC2
    container_name: mcp-context-forge
    restart: unless-stopped
    ports:
      - "4444:4444"
    environment:
      - TRANSPORT_TYPE=streamablehttp
      # PostgreSQL 连接（外部数据库）
      # 格式：postgresql+psycopg://用户名:密码@主机:端口/数据库名
      - DATABASE_URL=postgresql+psycopg://mcp:mcp@172.18.1.76:5432/mcp
      
      # Redis 连接（外部缓存）
      # 格式：redis://:密码@主机:端口/数据库编号
      - REDIS_URL=redis://:msikredis1108@10.18.1.174:6379/3
      - CACHE_TYPE=redis
      
      # JWT 认证配置（生产环境请务必使用强密钥）
      - JWT_SECRET_KEY=9qW8xRtY2mNpL5kZ3vB7cX1aF6gH4jM9pL2kR8tY4=
      - JWT_ALGORITHM=HS256
      
      # 强制 JWT 包含 JTI 和过期声明（企业安全要求）
      - REQUIRE_JTI=true
      - REQUIRE_TOKEN_EXPIRATION=true
      
      # 禁用公开注册（生产推荐）
      - PUBLIC_REGISTRATION_ENABLED=false
      
      # 启用管理界面和管理 API
      - MCPGATEWAY_UI_ENABLED=true
      - MCPGATEWAY_ADMIN_API_ENABLED=true
      - PLATFORM_ADMIN_EMAIL=admin@example.com
      - PLATFORM_ADMIN_PASSWORD=changeme
      # 禁用基础认证，仅 JWT
      - API_ALLOW_BASIC_AUTH=true
      
      # 启用 OpenTelemetry 可观测性
      - OTEL_ENABLED=true
      
      # Gunicorn 工作进程数（可根据 CPU 核心调整）
      - GUNICORN_WORKERS=4
      
      # 日志级别
      - LOG_LEVEL=DEBUG
      
      # 安全 Cookie（生产环境启用）
      - SECURE_COOKIES=false
      
      # CORS 允许的源（按需修改）
      - CORS_ENABLED=true

      - HOST=0.0.0.0
      - PLUGINS_ENABLED=true
      - SSRF_ALLOW_PRIVATE_NETWORKS=true
      - SSRF_ALLOW_LOCALHOST=true
      - SSRF_DNS_FAIL_CLOSED=false
      
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      mcp-network:
        ipv4_address: 192.168.113.3
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:4444/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

networks:
  mcp-network:
    ipam:
      config:
        - subnet: 192.168.113.0/24