services:
  mcp-context-forge:
    image: ghcr.io/ibm/mcp-context-forge:1.0.0-RC2
    container_name: mcp-context-forge-prod
    restart: always

    # --- 端口映射 (请根据实际反向代理或暴露需求修改) ---
    ports:
      - "8080:8080"

    # --- 环境变量配置 ---
    environment:
      # 1. 数据库与缓存连接 (请替换为生产环境的真实地址和强密码)
      DATABASE_URL: postgresql://prod_user:${DB_PASSWORD}@your-postgres-host:5432/mcp_prod_db
      REDIS_URL: redis://your-redis-host:6379/0

      # 2. 认证配置 (支持 Basic Auth + Token Auth)
      # - API_ALLOW_BASIC_AUTH=true
      # - BASIC_AUTH_USER=${BASIC_AUTH_USER:-admin}
      # - BASIC_AUTH_PASSWORD=${BASIC_AUTH_PASSWORD:-changeme}
      API_ALLOW_BASIC_AUTH: "true"
      BASIC_AUTH_USERNAME: "admin"
      BASIC_AUTH_PASSWORD: "${BASIC_AUTH_PASSWORD}"
      AUTH_ENCRYPTION_SECRET: "${AUTH_ENCRYPTION_SECRET}"

      # 3. 生产环境运行模式与日志级别
      NODE_ENV: "production"
      LOG_LEVEL: "info"

      # 4. 启用管理后台与 Admin API (按需开启)
      MCPGATEWAY_UI_ENABLED: "true"
      MCPGATEWAY_ADMIN_API_ENABLED: "true"

    # --- 生产环境核心优化 ---

    # 1. 资源限制：防止单个容器耗尽宿主机资源
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

    # 2. 安全上下文：以非 root 用户运行，防止容器逃逸风险
    security_opt:
      - no-new-privileges:true
    user: "1001:1001"

    # 3. 健康检查：确保网关真正可用后再对外提供服务
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # 4. 日志轮转：防止日志文件无限增长撑爆磁盘
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

    # 5. 依赖条件：确保外部 DB 和 Redis 处于健康状态时才启动
    depends_on:
    # 注意：由于你的 DB/Redis 不在当前 compose 中，若它们在同一 Docker 网络，
    # 可在此处通过外部服务名进行条件等待（需配合外部网络配置）
    # 否则建议在启动脚本中先验证连通性。