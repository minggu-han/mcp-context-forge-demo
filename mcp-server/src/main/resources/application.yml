server:
  port: 8082

spring:
  application:
    name: mcp-server
  ai:
    mcp:
      server:
        protocol: STREAMABLE
        name: demo-mcp-server
        version: 1.0.0
        instructions: Demo MCP Server with Streamable HTTP transport
        streamable-http:
          mcp-endpoint: /mcp
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9000

logging:
  level:
    com.demo.mcp: DEBUG
    org.springframework.security: DEBUG
    org.springframework.ai: DEBUG